<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WJJ | Personal Page</title>
    <link rel="stylesheet" href="style.css?v=4">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="starsCanvas"></canvas>
    <canvas id="clickEffect"></canvas>

    <div class="card" id="card">
        <div class="avatar">W</div>
        <h1>WJJ</h1>
        <p class="greeting" id="greeting"></p>
        <p class="tagline" id="typewriter"></p>

        <div class="divider"></div>

        <p class="about">
            数据科学专业 · 对技术和创造充满热情
        </p>

        <div class="links">
            <a href="https://github.com/wnzmb" target="_blank" class="link-btn github">
                <span class="icon">⌘</span> GitHub
            </a>
            <a href="https://blog.wjjblog.ccwu.cc" target="_blank" class="link-btn blog">
                <span class="icon">📝</span> Blog
            </a>
            <a href="mailto:snoopy363924@gmail.com" class="link-btn contact">
                <span class="icon">✉</span> Contact
            </a>
            <a href="https://meme.wjjblog.ccwu.cc" target="_blank" class="link-btn meme">
                <span class="icon">😄</span> Meme & Wallpaper
            </a>
        </div>

        <div class="footer">
            <p class="status">🟢 Online</p>
            <p class="counter">你是第 <span id="visitor-count">-</span> 位访客</p>
        </div>
    </div>

    <script>
        const greetingEl = document.getElementById('greeting');
        const typewriterEl = document.getElementById('typewriter');

        const timeThemes = {
            night:    { greeting: '夜深了', bg: 'bg/night.gif' },
            morning:  { greeting: '早上好', bg: 'bg/morning.gif' },
            afternoon:{ greeting: '下午好', bg: 'bg/afternoon.gif' },
            evening:  { greeting: '晚上好', bg: 'bg/evening.gif' },
            dusk:     { greeting: '晚上好', bg: 'bg/dusk.gif' },
        };

        function getTimeTheme() {
            const hour = new Date().getHours();
            if (hour >= 6 && hour < 10) return timeThemes.morning;
            if (hour >= 10 && hour < 16) return timeThemes.afternoon;
            if (hour >= 16 && hour < 19) return timeThemes.evening;
            if (hour >= 19 && hour < 22) return timeThemes.dusk;
            return timeThemes.night;
        }

        const hour = new Date().getHours();
        const theme = getTimeTheme();
        document.body.style.background = `url('${theme.bg}') center/cover no-repeat fixed`;
        greetingEl.textContent = theme.greeting + '，访客 👋';

        starsCanvas.style.display = 'none';
        
        const texts = ['Data Science & Development', 'Building something cool...', 'Always learning.'];
        let textIndex = 0, charIndex = 0, isDeleting = false;
        
        function typeWriter() {
            const current = texts[textIndex];
            if (isDeleting) {
                typewriterEl.textContent = current.substring(0, charIndex--);
            } else {
                typewriterEl.textContent = current.substring(0, charIndex++);
            }
            let delay = isDeleting ? 50 : 100;
            if (!isDeleting && charIndex === current.length + 1) {
                delay = 2000;
                isDeleting = true;
            } else if (isDeleting && charIndex < 0) {
                isDeleting = false;
                textIndex = (textIndex + 1) % texts.length;
                delay = 500;
            }
            setTimeout(typeWriter, delay);
        }
        typeWriter();
        
        const canvas = document.getElementById('clickEffect');
        const ctx = canvas.getContext('2d');
        const starsCanvas = document.getElementById('starsCanvas');
        const starsCtx = starsCanvas.getContext('2d');
        
        function resizeCanvas() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            canvas.width = w;
            canvas.height = h;
            starsCanvas.width = w;
            starsCanvas.height = h;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        const stars = [];
        for (let i = 0; i < 150; i++) {
            stars.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                size: Math.random() * 2 + 0.5,
                speed: Math.random() * 2 + 1,
                opacity: Math.random() * 0.8 + 0.2
            });
        }
        
        function animateStars() {
            starsCtx.clearRect(0, 0, starsCanvas.width, starsCanvas.height);
            for (let star of stars) {
                star.y += star.speed;
                if (star.y > starsCanvas.height) {
                    star.y = 0;
                    star.x = Math.random() * starsCanvas.width;
                }
                starsCtx.beginPath();
                starsCtx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                starsCtx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
                starsCtx.fill();
            }
            requestAnimationFrame(animateStars);
        }
        animateStars();
        
        const particles = [];
        function createParticles(x, y) {
            const colors = ['#3b82f6', '#8b5cf6', '#ec4899', '#f59e0b', '#10b981'];
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    size: Math.random() * 6 + 2,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    life: 1
                });
            }
        }
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2;
                p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            }
            ctx.globalAlpha = 1;
            requestAnimationFrame(animateParticles);
        }
        animateParticles();
        document.addEventListener('click', (e) => createParticles(e.clientX, e.clientY));
        
        async function loadVisitorCount() {
            try {
                const response = await fetch('https://wjj-counter.snoopy4546147.workers.dev/api/counter');
                const data = await response.json();
                document.getElementById('visitor-count').textContent = data.count;
            } catch (error) {
                document.getElementById('visitor-count').textContent = '-';
            }
        }
        loadVisitorCount();
    </script>
</body>
</html>
