<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WJJ | Personal Page</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="clickEffect"></canvas>
    
    <div class="card" id="card">
        <div class="avatar">W</div>
        <h1>WJJ</h1>
        <p class="greeting" id="greeting"></p>
        <p class="tagline" id="typewriter"></p>
        
        <div class="divider"></div>
        
        <p class="about">
            数据科学专业 · 对技术和创造充满热情
        </p>
        
        <div class="links">
            <a href="https://github.com/wnzmb" target="_blank" class="link-btn">
                <span class="icon">⌘</span> GitHub
            </a>
            <a href="mailto:" class="link-btn">
                <span class="icon">✉</span> Contact
            </a>
        </div>
        
        <div class="footer">
            <p>Building something interesting...</p>
        </div>
    </div>
    
    <script>
        const greetingEl = document.getElementById('greeting');
        const typewriterEl = document.getElementById('typewriter');
        
        const greetings = {
            morning: '早上好',
            afternoon: '下午好',
            evening: '晚上好',
            night: '夜深了'
        };
        
        function getGreeting() {
            const hour = new Date().getHours();
            if (hour < 6) return greetings.night;
            if (hour < 12) return greetings.morning;
            if (hour < 18) return greetings.afternoon;
            return greetings.evening;
        }
        
        greetingEl.textContent = getGreeting() + '，访客 👋';
        
        const texts = ['Data Science & Development', 'Building something cool...', 'Always learning.'];
        let textIndex = 0, charIndex = 0, isDeleting = false;
        
        function typeWriter() {
            const current = texts[textIndex];
            if (isDeleting) {
                typewriterEl.textContent = current.substring(0, charIndex--);
            } else {
                typewriterEl.textContent = current.substring(0, charIndex++);
            }
            
            let delay = isDeleting ? 50 : 100;
            
            if (!isDeleting && charIndex === current.length + 1) {
                delay = 2000;
                isDeleting = true;
            } else if (isDeleting && charIndex < 0) {
                isDeleting = false;
                textIndex = (textIndex + 1) % texts.length;
                delay = 500;
            }
            
            setTimeout(typeWriter, delay);
        }
        
        typeWriter();
        
        const canvas = document.getElementById('clickEffect');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        const particles = [];
        
        function createParticles(x, y) {
            const colors = ['#3b82f6', '#8b5cf6', '#ec4899', '#f59e0b', '#10b981'];
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    size: Math.random() * 6 + 2,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    life: 1
                });
            }
        }
        
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2;
                p.life -= 0.02;
                
                if (p.life <= 0) particles.splice(i, 1);
            }
            
            ctx.globalAlpha = 1;
            requestAnimationFrame(animateParticles);
        }
        
        animateParticles();
        document.addEventListener('click', (e) => createParticles(e.clientX, e.clientY));
        
        const card = document.getElementById('card');
        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const rotateX = (y - centerY) / 20;
            const rotateY = (centerX - x) / 20;
            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });
        
        card.addEventListener('mouseleave', () => {
            card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0)';
        });
    </script>
</body>
</html>
